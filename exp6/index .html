<!DOCTYPE html>
<html>
<head>
    <title>User Login Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #af916c;
        }

        .form-box {
            width: 400px;
            background-color: rgb(36, 34, 35);
            padding: 20px;
            margin: 60px auto;
            border-radius: 8px;
            box-shadow: 0px 0px 10px rgb(9, 34, 142);
        }

        h2 {
            text-align: center;
            color: #585acb;
        }

        label {
            font-weight: bold;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="password"],
        textarea {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #e2a8a8;
        }

        textarea {
            resize: none;
        }

        input[type="submit"] {
            width: 100%;
            padding: 10px;
            background-color: #7e12d05f;
            color: rgba(19, 18, 18, 0.86);
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #0d6efd;
        }
    </style>

</head>
<body>

    <div class="form-box">
        <h2>User Login</h2>

        <form action="welcome.html" method="post">

            <label>Full Name:</label>
            <input type="text" name="fullname" required>

            <label>Email:</label>
            <input type="email" name="email" required>

            <label>Phone Number:</label>
            <input type="tel" name="phone" required>

            <label>Password:</label>
            <input type="password" name="password" required>

            <label>Message:</label>
            <textarea name="message" rows="4" required></textarea>

            <input type="submit" value="Submit">

        </form>
    </div>

</body>
</html>
